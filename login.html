<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuilderPro OS — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080e1f;--panel:#0c1428;--panel2:#0e1830;--line:rgba(80,140,255,.18);
  --blue:#0070ff;--blue2:#3d7fff;--txt:rgba(255,255,255,.85);--mut:rgba(255,255,255,.5);
  --red:#ff5a5a;--green:#00d478;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px;
  background-image:radial-gradient(900px 500px at 50% -10%,rgba(0,112,255,.14),transparent);}
.wrap{width:100%;max-width:400px;}
.brand{display:flex;align-items:center;justify-content:center;gap:.6rem;margin-bottom:1.6rem;}
.brand .mk{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--blue2));
  display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:800;font-size:22px;color:#fff;}
.brand .nm{font-family:'Barlow Condensed';font-weight:700;font-size:1.5rem;letter-spacing:.02em;color:#fff;}
.brand .nm span{color:var(--blue2);}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:2rem 1.8rem;
  box-shadow:0 24px 60px rgba(0,0,0,.4);}
h1{font-family:'Barlow Condensed';font-weight:700;font-size:1.5rem;color:#fff;margin-bottom:.3rem;}
.sub{font-size:.9rem;color:var(--mut);margin-bottom:1.5rem;}
.tabs{display:flex;gap:.4rem;margin-bottom:1.3rem;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:.3rem;}
.tab{flex:1;text-align:center;padding:.55rem;font-size:.86rem;font-weight:600;border-radius:7px;cursor:pointer;color:var(--mut);transition:.15s;}
.tab.on{background:var(--blue);color:#fff;}
label{display:block;font-size:.8rem;font-weight:600;color:var(--txt);margin:.9rem 0 .4rem;}
input{width:100%;padding:.75rem .9rem;background:var(--panel2);border:1px solid var(--line);border-radius:9px;
  color:#fff;font-size:.95rem;font-family:inherit;outline:none;transition:.15s;}
input:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(61,127,255,.16);}
.btn{width:100%;margin-top:1.3rem;padding:.8rem;background:var(--blue);color:#fff;border:none;border-radius:9px;
  font-family:'Barlow';font-size:.98rem;font-weight:700;cursor:pointer;transition:.15s;}
.btn:hover{background:var(--blue2);box-shadow:0 6px 20px rgba(0,112,255,.4);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.forgot{display:block;text-align:right;font-size:.82rem;color:var(--blue2);margin-top:.7rem;cursor:pointer;background:none;border:none;font-family:inherit;margin-left:auto;}
.forgot:hover{text-decoration:underline;}
.msg{margin-top:1rem;padding:.7rem .9rem;border-radius:9px;font-size:.85rem;display:none;}
.msg.err{background:rgba(255,90,90,.12);border:1px solid rgba(255,90,90,.3);color:var(--red);display:block;}
.msg.ok{background:rgba(0,212,120,.12);border:1px solid rgba(0,212,120,.3);color:var(--green);display:block;}
.foot{text-align:center;font-size:.78rem;color:var(--mut);margin-top:1.4rem;}
.hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="mk">B</span><span class="nm">BuilderPro<span>OS</span></span></div>
  <div class="card">
    <!-- SIGN IN / CREATE ACCOUNT -->
    <div id="authView">
      <h1 id="authTitle">Welcome back</h1>
      <div class="sub" id="authSub">Sign in to your BuilderPro dashboard.</div>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <button class="forgot" id="forgotLink" onclick="showForgot()">Forgot password?</button>
      <button class="btn" id="authBtn" onclick="doAuth()">Sign In</button>
      <div class="msg" id="authMsg"></div>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="forgotView" class="hidden">
      <h1>Reset your password</h1>
      <div class="sub">Enter your email and we'll send you a reset link.</div>
      <label for="femail">Email</label>
      <input type="email" id="femail" placeholder="you@company.com" autocomplete="email">
      <button class="btn" id="fBtn" onclick="doForgot()">Send Reset Link</button>
      <button class="forgot" style="margin-top:1rem;margin-left:0;text-align:center;width:100%" onclick="backToAuth()">← Back to sign in</button>
      <div class="msg" id="fMsg"></div>
    </div>
  </div>
  <div class="foot">Powered by BuilderPro OS</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="bp-config.js"></script>
<script>
// Where the password-reset email should send people (must be an allowed redirect URL in Supabase)
var RESET_REDIRECT = window.location.origin + window.location.pathname.replace(/login\.html$/,'') + 'reset-password.html';

function showMsg(id,type,text){ var el=document.getElementById(id); el.className='msg '+type; el.textContent=text; }
function hideMsg(id){ var el=document.getElementById(id); el.className='msg'; }
function showForgot(){ document.getElementById('authView').classList.add('hidden'); document.getElementById('forgotView').classList.remove('hidden'); }
function backToAuth(){ document.getElementById('forgotView').classList.add('hidden'); document.getElementById('authView').classList.remove('hidden'); hideMsg('fMsg'); }

async function doAuth(){
  var email=document.getElementById('email').value.trim();
  var pw=document.getElementById('password').value;
  var btn=document.getElementById('authBtn');
  hideMsg('authMsg');
  if(!email || !pw){ showMsg('authMsg','err','Please enter your email and password.'); return; }
  btn.disabled=true; btn.textContent='Signing in…';
  try{
    var { error } = await bpClient.auth.signInWithPassword({ email:email, password:pw });
    if(error) throw error;
    window.location.href = 'portal.html';
  }catch(e){
    showMsg('authMsg','err', friendly(e.message));
  }finally{
    btn.disabled=false; btn.textContent='Sign In';
  }
}

async function doForgot(){
  var email=document.getElementById('femail').value.trim();
  var btn=document.getElementById('fBtn');
  hideMsg('fMsg');
  if(!email){ showMsg('fMsg','err','Please enter your email.'); return; }
  btn.disabled=true; btn.textContent='Sending…';
  try{
    var { error } = await bpClient.auth.resetPasswordForEmail(email, { redirectTo: RESET_REDIRECT });
    if(error) throw error;
    showMsg('fMsg','ok','If an account exists for that email, a reset link is on its way. Check your inbox.');
  }catch(e){
    showMsg('fMsg','err', friendly(e.message));
  }finally{
    btn.disabled=false; btn.textContent='Send Reset Link';
  }
}

function friendly(m){
  if(!m) return 'Something went wrong. Please try again.';
  if(/invalid login/i.test(m)) return 'Incorrect email or password.';
  if(/rate limit/i.test(m)) return 'Too many attempts. Please wait a moment and try again.';
  return m;
}

// If already logged in, skip straight to the portal
(async function(){
  try{ var { data } = await bpClient.auth.getSession(); if(data.session) window.location.href='portal.html'; }catch(e){}
})();

// Enter key submits
document.getElementById('password').addEventListener('keydown',function(e){ if(e.key==='Enter') doAuth(); });
document.getElementById('femail').addEventListener('keydown',function(e){ if(e.key==='Enter') doForgot(); });
</script>
</body>
</html>
