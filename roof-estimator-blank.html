<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Roof Estimator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#ffffff;--card:#f5f7fa;--border:#e2e8f0;--bs:#dbe2ea;
--text:#111827;--txt:#111827;--mu:#475569;--muted:#475569;
--a:#2f6fb0;--al:#3f86c9;--blue-l:#3f86c9;--cyan:#3f86c9;--ag:rgba(47,111,176,.12);
--green:#15803d;--red:#dc2626;}
html,body{margin:0;background:#eef1f6;font-family:'Barlow',system-ui,sans-serif;}
.est-stage{max-width:980px;margin:32px auto;padding:0 16px;}
#est-embed{border:1px solid #e2e8f0;border-radius:18px;overflow:hidden;box-shadow:0 18px 50px rgba(15,23,38,.10);}
#est-embed .leaflet-container{background:#dfe6ee !important;}

/* estimator (de-branded, light) */

/* ── Estimator scoped styles ── */
#est-embed {
  font-family: 'Barlow', sans-serif;
  background: #ffffff;
  color: #111827;
  width: 100%;
  position: relative;
}
#est-embed * { box-sizing: border-box; }

#est-embed {
  --a: #2f6fb0;
  --al: #9cc8ee;
  --ag: rgba(47,111,176,0.18);
  --bg: #02040b;
  --card: rgba(47,111,176,0.55);
  --border: rgba(47,111,176,0.22);
  --bs: rgba(255, 255, 255, 0.07);
  --w: #ffffff;
  --txt: rgba(255, 255, 255, 0.75);
  --mu: rgba(255, 255, 255, 0.38);
  --green: #00d478;
  --red: #ff4444;
}

/* TOPBAR inside estimator */
#est-embed .e-topbar {
  padding: 14px 28px;
  border-bottom: 1px solid var(--bs);
  display: flex; align-items: center; justify-content: space-between;
  background: #ffffff;
  backdrop-filter: blur(20px);
}
#est-embed .e-tlogo { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px; color: #fff; display: flex; align-items: center; gap: 8px; }
#est-embed .e-tlogo span { color: var(--al); }
#est-embed .e-ldot { width: 7px; height: 7px; border-radius: 50%; background: var(--a); box-shadow: 0 0 8px var(--a); }
#est-embed .e-tstep { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--mu); }
#est-embed .e-tstep b { color: var(--al); }

/* PROGRESS */
#est-embed .e-prog { height: 3px; background: var(--bs); }
#est-embed .e-pfill { height: 100%; background: linear-gradient(90deg, var(--a), var(--al)); transition: width .7s cubic-bezier(.16,1,.3,1); }

/* STEP PANELS */
#est-embed .e-app { position: relative; }
#est-embed .e-sp { display: none; }
#est-embed .e-sp.active { display: flex; flex-direction: column; animation: eSpIn .4s cubic-bezier(.16,1,.3,1) both; }
#est-embed .e-sp.back { animation: eSpBack .4s cubic-bezier(.16,1,.3,1) both; }
@keyframes eSpIn  { from { opacity:0; transform:translateX(20px) } to { opacity:1; transform:none } }
@keyframes eSpBack { from { opacity:0; transform:translateX(-20px) } to { opacity:1; transform:none } }

#est-embed .e-shdr { padding: 28px 32px 0; max-width: 860px; margin: 0 auto; width: 100%; }
#est-embed .e-sbody { padding: 16px 32px 36px; max-width: 860px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; flex: 1; }
@media (max-width: 640px) {
  #est-embed .e-shdr, #est-embed .e-sbody { padding-left: 16px; padding-right: 16px; }
  #est-embed .e-shdr { padding-top: 20px; }
}

#est-embed .e-seye { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: var(--al); margin-bottom: 8px; display: block; }
#est-embed .e-stitle { font-family: 'Bebas Neue', sans-serif; font-size: clamp(28px, 4vw, 46px); line-height: .93; letter-spacing: 1px; color: #fff; margin-bottom: 6px; }
#est-embed .e-stitle em { color: var(--a); font-style: normal; }
#est-embed .e-ssub { font-size: 14px; color: var(--mu); line-height: 1.6; margin-bottom: 18px; max-width: 540px; }

/* CARD */
#est-embed .e-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; backdrop-filter: blur(12px); box-shadow: 0 12px 36px rgba(0,0,0,.26); margin-bottom: 12px; }

/* ADDRESS SEARCH */
#est-embed .e-asearch { position: relative; margin-bottom: 10px; }
#est-embed .e-asearch-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; z-index: 2; }
#est-embed .e-asearch-input {
  width: 100%;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--bs);
  border-radius: 10px;
  padding: 13px 13px 13px 44px;
  font-family: 'Barlow', sans-serif; font-size: 15px; color: #fff;
  outline: none;
  transition: all .3s;
}
#est-embed .e-asearch-input::placeholder { color: var(--mu); }
#est-embed .e-asearch-input:focus { border-color: var(--a); background: rgba(47,111,176,0.09); box-shadow: 0 0 0 3px var(--ag); }

/* SUGGESTIONS */
#est-embed .e-suggestions {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: #08112a;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  z-index: 9999;
  display: none;
  max-height: 240px;
  overflow-y: auto;
  box-shadow: 0 14px 40px rgba(0,0,0,.6);
}
#est-embed .e-suggestions.open { display: block; }
#est-embed .e-suggestion {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 11px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--bs);
  transition: background .18s;
  font-size: 13px; color: var(--txt);
}
#est-embed .e-suggestion:last-child { border: none; }
#est-embed .e-suggestion:hover { background: rgba(47,111,176,0.14); color: #fff; }
#est-embed .e-suggestion-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
#est-embed .e-suggestion-main { font-weight: 600; color: #fff; }
#est-embed .e-suggestion-sub { font-size: 11px; color: var(--mu); margin-top: 2px; }
#est-embed .e-suggestion-loading { padding: 12px 14px; font-size: 12px; color: var(--mu); display: flex; align-items: center; gap: 8px; }
#est-embed .e-spin-sm { width: 13px; height: 13px; border-radius: 50%; border: 2px solid var(--bs); border-top-color: var(--al); animation: eSpin .7s linear infinite; display: inline-block; }
@keyframes eSpin { to { transform: rotate(360deg); } }

/* MAP */
#est-embed .e-mapwrap { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 10px; display: none; }
#est-embed .e-maptb { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: #eef2f7; border-bottom: 1px solid var(--bs); flex-wrap: wrap; }
#est-embed .e-mtbtn {
  display: flex; align-items: center; gap: 4px;
  background: rgba(47,111,176,0.3); border: 1px solid rgba(47,111,176,0.22); border-radius: 6px;
  padding: 5px 10px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: var(--al); cursor: pointer; transition: all .22s;
}
#est-embed .e-mtbtn:hover, #est-embed .e-mtbtn.on { background: rgba(47,111,176,0.32); border-color: var(--a); color: #fff; }
#est-embed .e-mtbtn.del { border-color: rgba(255,60,60,.25); color: var(--red); }
#est-embed .e-mtbtn.del:hover { background: rgba(255,60,60,.12); border-color: var(--red); }
#est-embed .e-mstat { margin-left: auto; font-size: 10px; color: var(--mu); letter-spacing: 1px; text-align: right; }
#est-embed #e-mapel { width: 100%; height: 400px; }
@media (max-width: 640px) { #est-embed #e-mapel { height: 280px; } }
#est-embed .e-mhint { padding: 8px 12px; background: rgba(47,111,176,0.2); font-size: 11px; color: #3a6286; border-top: 1px solid var(--bs); line-height: 1.5; }

/* MEASURED RESULT */
#est-embed .e-mresult {
  display: none; align-items: center; gap: 12px;
  padding: 12px 16px;
  background: rgba(47,111,176,0.12); border: 1px solid rgba(47,111,176,0.28); border-radius: 10px;
  margin-bottom: 10px;
}
#est-embed .e-mrn { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: #fff; line-height: 1; }
#est-embed .e-mrl { font-size: 10px; color: var(--mu); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
#est-embed .e-mrbadge { color: var(--green); }
#est-embed .e-mrsq { font-size: 11px; color: var(--mu); margin-left: 6px; }
#est-embed .e-mredit { margin-left: auto; font-size: 11px; color: var(--al); cursor: pointer; text-decoration: underline; white-space: nowrap; }

/* MANUAL SLIDER */
#est-embed .e-manualbtn {
  background: transparent; border: 1px solid var(--bs); border-radius: 7px;
  padding: 7px 14px; font-size: 11px; color: var(--mu); cursor: pointer;
  transition: all .22s; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 10px; display: block;
}
#est-embed .e-manualbtn:hover { border-color: var(--border); color: #fff; }
#est-embed .e-sldwrap { display: none; }
#est-embed .e-slddisp { display: flex; align-items: baseline; gap: 6px; margin-bottom: 12px; }
#est-embed .e-sldval { font-family: 'Bebas Neue', sans-serif; font-size: 46px; color: #fff; line-height: 1; }
#est-embed .e-sldunit { font-size: 12px; color: var(--mu); letter-spacing: 2px; text-transform: uppercase; }
#est-embed input[type=range].e-sld { width: 100%; -webkit-appearance: none; height: 5px; background: var(--bs); border-radius: 3px; outline: none; cursor: pointer; }
#est-embed input[type=range].e-sld::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(135deg,var(--a),var(--al)); border: 2px solid rgba(255,255,255,.2); box-shadow: 0 0 12px var(--ag); cursor: pointer; }
#est-embed .e-sldlbl { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10px; color: var(--mu); }

/* OPTION LIST */
#est-embed .e-olist { display: flex; flex-direction: column; gap: 8px; }
#est-embed .e-oi {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px;
  background: rgba(255,255,255,.03); border: 1px solid var(--bs); border-radius: 10px;
  cursor: pointer;
  transition: all .32s cubic-bezier(.16,1,.3,1);
  position: relative; overflow: hidden;
}
#est-embed .e-oi::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,rgba(47,111,176,0.07),transparent 60%); opacity:0; transition:opacity .3s; }
#est-embed .e-oi:hover { border-color: rgba(47,111,176,0.35); background: rgba(47,111,176,0.14); transform: translateX(3px); }
#est-embed .e-oi:hover::before { opacity: 1; }
#est-embed .e-oi.sel { border-color: var(--a); background: rgba(47,111,176,0.2); box-shadow: 0 0 0 1px var(--a), 0 0 18px var(--ag); transform: translateX(5px); }
#est-embed .e-oi.sel::before { opacity: 1; }
#est-embed .e-oi-em { font-size: 22px; flex-shrink: 0; width: 32px; text-align: center; }
#est-embed .e-oi-info { flex: 1; }
#est-embed .e-oi-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #fff; }
#est-embed .e-oi-desc { font-size: 11px; color: var(--mu); margin-top: 2px; line-height: 1.4; }
#est-embed .e-oi-tag { font-size: 10px; color: var(--al); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0; }
#est-embed .e-oi-radio { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--bs); display: flex; align-items: center; justify-content: center; font-size: 9px; color: transparent; flex-shrink: 0; transition: all .28s; }
#est-embed .e-oi.sel .e-oi-radio { background: var(--a); border-color: var(--a); color: #fff; box-shadow: 0 0 8px var(--ag); }

/* REGION GRID */
#est-embed .e-regg { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin-bottom: 8px; }
@media (max-width: 500px) { #est-embed .e-regg { grid-template-columns: 1fr 1fr; } }
#est-embed .e-rb { background: rgba(255,255,255,.04); border: 1px solid var(--bs); border-radius: 8px; padding: 9px 10px; cursor: pointer; transition: all .28s; text-align: center; }
#est-embed .e-rb:hover { border-color: rgba(47,111,176,0.3); background: rgba(47,111,176,0.12); }
#est-embed .e-rb.on { border-color: var(--a); background: rgba(47,111,176,0.18); box-shadow: 0 0 0 1px var(--a); }
#est-embed .e-rb-n { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #fff; }
#est-embed .e-rb-s { font-size: 9px; color: var(--mu); margin-top: 2px; }

/* FORM */
#est-embed .e-fr2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 520px) { #est-embed .e-fr2 { grid-template-columns: 1fr; } }
#est-embed .e-fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
#est-embed .e-fl { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--mu); }
#est-embed .e-fi {
  background: rgba(255,255,255,.05); border: 1px solid var(--bs); border-radius: 9px;
  padding: 11px 14px; font-family: 'Barlow', sans-serif; font-size: 14px; color: #fff;
  outline: none; transition: all .28s; width: 100%;
}
#est-embed .e-fi::placeholder { color: var(--mu); }
#est-embed .e-fi:focus { border-color: var(--a); background: rgba(47,111,176,0.09); box-shadow: 0 0 0 3px var(--ag); }
#est-embed .e-consent { font-size: 11px; color: var(--mu); line-height: 1.65; padding: 10px 12px; background: rgba(255,255,255,.03); border: 1px solid var(--bs); border-radius: 7px; margin-bottom: 16px; }

/* BUTTONS */
#est-embed .e-btnrow { display: flex; gap: 10px; margin-top: auto; padding-top: 14px; }
#est-embed .e-btnmain {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 15px 24px;
  background: linear-gradient(90deg, #6aa6dd, #8fc1ea);
  border: none; border-radius: 10px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: #fff; cursor: pointer;
  transition: all .4s cubic-bezier(.16,1,.3,1);
  box-shadow: 0 0 20px rgba(47,111,176,0.22);
  position: relative; overflow: hidden;
}
#est-embed .e-btnmain::before { content:''; position:absolute; inset:0; background:linear-gradient(rgba(255,255,255,.08),transparent); pointer-events:none; }
#est-embed .e-btnmain:hover { box-shadow: 0 0 44px rgba(47,111,176,0.45), 0 7px 20px rgba(0,0,0,.3); transform: translateY(-2px); }
#est-embed .e-btnmain:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }
#est-embed .e-btnback {
  display: flex; align-items: center; gap: 5px;
  background: transparent; border: 1px solid var(--bs); border-radius: 9px;
  padding: 12px 16px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: var(--mu); cursor: pointer; transition: all .28s; flex-shrink: 0;
}
#est-embed .e-btnback:hover { border-color: var(--border); color: #fff; }

/* STEP DOTS */
#est-embed .e-stepdots { display: flex; justify-content: center; gap: 5px; padding: 14px 0 0; }
#est-embed .e-sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--bs); transition: all .4s cubic-bezier(.16,1,.3,1); }
#est-embed .e-sdot.done { background: var(--green); }
#est-embed .e-sdot.act { background: var(--a); width: 18px; border-radius: 3px; box-shadow: 0 0 8px var(--ag); }

/* LOADING */
#est-embed .e-ldpanel { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 70px 32px; gap: 24px; }
#est-embed .e-ldring { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--bs); border-top-color: var(--a); animation: eSpin .85s linear infinite; }
#est-embed .e-ldsteps { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 320px; }
#est-embed .e-ldstp { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: rgba(47,111,176,0.12); border: 1px solid var(--bs); border-radius: 8px; font-size: 12px; color: var(--mu); transition: all .42s; }
#est-embed .e-ldstp.act { color: #fff; border-color: var(--border); background: rgba(47,111,176,0.22); }
#est-embed .e-ldstp.done { color: var(--green); border-color: rgba(47,111,176,0.2); background: rgba(47,111,176,0.07); }
#est-embed .e-lddot { width: 6px; height: 6px; border-radius: 50%; background: var(--bs); flex-shrink: 0; transition: background .4s; }
#est-embed .e-ldstp.act .e-lddot { background: var(--al); animation: eBlk 1.1s ease-in-out infinite; }
#est-embed .e-ldstp.done .e-lddot { background: var(--green); }
@keyframes eBlk { 0%,100%{opacity:1} 50%{opacity:.25} }

/* RESULT */
#est-embed .e-rpage { max-width: 860px; margin: 0 auto; padding: 28px 32px; width: 100%; }
@media (max-width: 640px) { #est-embed .e-rpage { padding: 16px; } }
#est-embed .e-rhero { text-align: center; padding: 28px 24px; background: linear-gradient(135deg, rgba(47,111,176,0.55), #eef2f7); border: 1px solid rgba(47,111,176,0.3); border-radius: 18px; margin-bottom: 14px; box-shadow: 0 0 50px rgba(47,111,176,0.1); }
#est-embed .e-rbadge { display: inline-flex; align-items: center; gap: 5px; background: rgba(47,111,176,0.1); border: 1px solid rgba(47,111,176,0.25); border-radius: 18px; padding: 4px 12px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--green); margin-bottom: 12px; }
#est-embed .e-rlbl { font-size: 10px; color: var(--mu); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 5px; }
#est-embed .e-rrange { font-family: 'Bebas Neue', sans-serif; font-size: clamp(30px,5vw,54px); color: #fff; line-height: 1; letter-spacing: 2px; margin-bottom: 7px; }
#est-embed .e-rrange em { color: var(--a); font-style: normal; }
#est-embed .e-rnote { font-size: 12px; color: var(--mu); line-height: 1.6; }
#est-embed .e-rgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 9px; margin-bottom: 14px; }
@media (max-width: 500px) { #est-embed .e-rgrid { grid-template-columns: 1fr 1fr; } }
#est-embed .e-rbox { background: rgba(47,111,176,0.28); border: 1px solid var(--border); border-radius: 10px; padding: 12px 9px; text-align: center; animation: eRbIn .5s cubic-bezier(.16,1,.3,1) both; }
#est-embed .e-rbox:nth-child(1){animation-delay:.04s} #est-embed .e-rbox:nth-child(2){animation-delay:.09s} #est-embed .e-rbox:nth-child(3){animation-delay:.14s} #est-embed .e-rbox:nth-child(4){animation-delay:.19s} #est-embed .e-rbox:nth-child(5){animation-delay:.24s} #est-embed .e-rbox:nth-child(6){animation-delay:.29s}
@keyframes eRbIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
#est-embed .e-rbv { font-family: 'Bebas Neue', sans-serif; font-size: 19px; color: #fff; line-height: 1; margin-bottom: 3px; }
#est-embed .e-rbl { font-size: 8px; color: var(--mu); letter-spacing: 1.5px; text-transform: uppercase; }
#est-embed .e-disc { font-size: 11px; color: var(--mu); line-height: 1.75; padding: 12px 14px; background: rgba(255,255,255,.03); border: 1px solid var(--bs); border-radius: 9px; margin-bottom: 16px; }
#est-embed .e-rcta { display: flex; flex-direction: column; align-items: center; gap: 9px; }
#est-embed .e-rcta .e-btnmain { max-width: 400px; }
#est-embed .e-rctasub { font-size: 11px; color: var(--mu); }
#est-embed .e-restart { background: transparent; border: none; font-size: 12px; color: var(--mu); cursor: pointer; text-decoration: underline; transition: color .2s; margin-top: 3px; }
#est-embed .e-restart:hover { color: #fff; }

/* Leaflet dark theme override scoped to estimator */
#est-embed .leaflet-container { background: #dfe6ee !important; }
#est-embed .leaflet-control-zoom a { background: #ffffff !important; color: var(--al) !important; border-color: var(--border) !important; }
#est-embed .leaflet-control-zoom a:hover { background: rgba(47,111,176,0.2) !important; }
#est-embed .leaflet-bar { border: 1px solid var(--border) !important; border-radius: 8px !important; overflow: hidden !important; box-shadow: none !important; }

#est-embed .e-tlogo,
#est-embed .e-stitle,
#est-embed .e-asearch-input,
#est-embed .e-suggestion:hover,
#est-embed .e-suggestion-main,
#est-embed .e-mrn,
#est-embed .e-manualbtn:hover,
#est-embed .e-sldval,
#est-embed .e-oi-lbl,
#est-embed .e-rb-n,
#est-embed .e-fi,
#est-embed .e-btnback:hover,
#est-embed .e-rrange,

    eClickPoly=L.polygon(eClickPts,{color:'#9cc8ee',weight:2,fillColor:'#2f6fb0',fillOpacity:0.22,interactive:false}).addTo(eLmap);
  }
  eUpdateAreaDisplay();
}
function eFinishPolygon() {
  if(eClickPts.length<3) return;
  var sqft=eCalcSqFt(eClickPts);
  var poly=L.polygon(eClickPts,{color:'#7ad19a',weight:2,fillColor:'#2f6fb0',fillOpacity:0.28,interactive:false}).addTo(eLmap);
  eFacets.push({sqft:sqft, poly:poly});
  eFacetTotal+=sqft;
  eClickMarkers.forEach(function(m){ if(eLmap) eLmap.removeLayer(m); }); eClickMarkers=[];
  if(eClickLine){ eLmap.removeLayer(eClickLine); eClickLine=null; }
  if(eClickPoly){ eLmap.removeLayer(eClickPoly); eClickPoly=null; }
  eClickPts=[];
  eUpdateAreaDisplay();
  document.getElementById('e-mstat').textContent=eFacets.length+' section'+(eFacets.length>1?'s':'')+' traced · total '+eCurrentPlanTotal().toLocaleString()+' sq ft. Trace another, or Clear.';
  eSetDrawMode(true);
}
function eCalcSqFt(pts) {
  if(!pts||pts.length<3) return 0;
  var R=6378137, area=0, n=pts.length;
  for(var i=0;i<n;i++){ var j=(i+1)%n, lat1=pts[i].lat*Math.PI/180, lat2=pts[j].lat*Math.PI/180, dLon=(pts[j].lng-pts[i].lng)*Math.PI/180; area+=dLon*(2+Math.sin(lat1)+Math.sin(lat2)); }
  return Math.round(Math.abs(area*R*R/2)*10.7639);
}
function eToggleImagery(){
  eImageryHD=!eImageryHD;
  if(!eLmap) return;
  if(eImageryHD){ if(eTileStd) eLmap.removeLayer(eTileStd); eTileHD.addTo(eLmap); }
  else { if(eTileHD) eLmap.removeLayer(eTileHD); eTileStd.addTo(eLmap); }
  var b=document.getElementById('e-btnhd'); if(b) b.textContent='HD: '+(eImageryHD?'On':'Off');
}
function eSlopeFactor(pp){ var r=parseFloat((pp||'0/12').split('/')[0])||0; return Math.sqrt(r*r+144)/12; }
function eSlopeToCat(pp){ var r=parseFloat((pp||'4/12').split('/')[0])||0; if(r<1)return 'flat'; if(r<4)return 'low'; if(r<7)return 'medium'; if(r<10)return 'steep'; return 'very-steep'; }
function eDegToPitch(deg){ var x=Math.round(12*Math.tan((deg||0)*Math.PI/180)); var opts=[0,3,4,6,8,10,12]; var best=opts[0],bd=1e9; for(var i=0;i<opts.length;i++){ var dd=Math.abs(opts[i]-x); if(dd<bd){bd=dd;best=opts[i];} } return best+'/12'; }
function eSetMeasurePitch(pp){ eMeasurePitch=pp; eS.solarPitchDeg=null; eUpdateAreaDisplay(); }
function eToggleFlat(on){ eS.flatRoof=on; if(on) eS.pitch='flat'; eUpdateAreaDisplay(); }
function eHandleZip(v){ try{ eS.zip=(v||'').replace(/[^0-9]/g,'').slice(0,5); var b=document.getElementById('e-zipcont'); if(b) b.disabled=(eS.zip.length!==5); }catch(e){} }
function eZipNext(){ var z=document.getElementById('e-zippanel'), a=document.getElementById('e-addrpanel'); if(z)z.style.display='none'; if(a)a.style.display='block'; document.getElementById('e-tstep').innerHTML='Step <b>1</b> of 10 \u2014 Address'; if(eLmap) setTimeout(function(){ eLmap.invalidateSize(); },150); }
function eZipBack(){ var z=document.getElementById('e-zippanel'), a=document.getElementById('e-addrpanel'); if(a)a.style.display='none'; if(z)z.style.display='block'; document.getElementById('e-tstep').innerHTML='Step <b>1</b> of 10 \u2014 Location'; }
function eCurrentPlanTotal(){ var t=eFacetTotal; if(eClickPts.length>=3) t+=eCalcSqFt(eClickPts); return Math.round(t); }
function eUpdateAreaDisplay(){
  var plan=eCurrentPlanTotal();
  var factor=(eS.flatRoof?1.0:(eS.solarPitchDeg?(1/Math.cos(eS.solarPitchDeg*Math.PI/180)):eSlopeFactor(eMeasurePitch)));
  var trueArea=Math.round(plan*factor);
  var mrn=document.getElementById('e-mrn'); if(mrn) mrn.textContent=plan.toLocaleString();
  var msq=document.getElementById('e-msq'); if(msq) msq.textContent=Math.ceil(trueArea/100)+' roofing squares (true area)';
  var ta=document.getElementById('e-truearea'); if(ta) ta.textContent='True roof area: '+trueArea.toLocaleString()+' sq ft';
  var si=document.getElementById('e-slopeinfo'); if(si){ si.textContent = eS.flatRoof ? 'Flat / low-slope roof \u2014 no pitch adjustment' : (eS.solarPitchDeg ? ('Roof slope: ~'+eS.solarPitchDeg+'\u00b0 (measured automatically)') : 'Roof slope: using a typical estimate'); }
  var res=document.getElementById('e-mresult'); if(res) res.style.display=plan>0?'flex':'none';
  var card=document.getElementById('e-slopecard'); if(card) card.style.display=plan>0?'block':'none';
  if(plan>0){ eS.sqft=trueArea; eS.planSqft=plan; eS.usedMap=true; eS.pitch=eSlopeToCat(eMeasurePitch); }
  eCheckBtn1();
}
function eDistFt(a,b){
  var R=6371000, dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lng-a.lng)*Math.PI/180;
  var la1=a.lat*Math.PI/180, la2=b.lat*Math.PI/180;
  var h=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return 2*R*Math.asin(Math.sqrt(h))*3.28084;
}
function eMeasureLabelMarker(mid,txt){
  return L.marker(mid,{interactive:false,icon:L.divIcon({className:'',html:'<div style="background:#dc2626;color:#fff;font:700 11px Barlow,sans-serif;padding:2px 6px;border-radius:4px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.35)">'+txt+'</div>',iconSize:[0,0]})}).addTo(eLmap);
}
function eMeasureClick(e){
  eMeasurePts.push(e.latlng);
  eMeasureMarkers.push(L.circleMarker(e.latlng,{radius:4,color:'#fff',fillColor:'#dc2626',fillOpacity:1,weight:2,interactive:false}).addTo(eLmap));
  eMeasureRedraw();
}
function eMeasureRedraw(){
  if(eMeasureLine){ eLmap.removeLayer(eMeasureLine); eMeasureLine=null; }
  eMeasureLabels.forEach(function(l){ eLmap.removeLayer(l); }); eMeasureLabels=[];
  if(eMeasurePts.length>=2){
    eMeasureLine=L.polyline(eMeasurePts,{color:'#dc2626',weight:3,opacity:.9,interactive:false}).addTo(eLmap);
    var total=0;
    for(var i=1;i<eMeasurePts.length;i++){
      var a=eMeasurePts[i-1], b=eMeasurePts[i], d=eDistFt(a,b); total+=d;
      eMeasureLabels.push(eMeasureLabelMarker(L.latLng((a.lat+b.lat)/2,(a.lng+b.lng)/2), Math.round(d)+' ft'));
    }
    document.getElementById('e-mstat').textContent='Measuring \u00b7 total '+Math.round(total)+' ft (double-click to finish)';
  } else {
    document.getElementById('e-mstat').textContent='Click two points to measure a length (double-click to finish)';
  }
}
function eFinishMeasure(){
  if(eMeasurePts.length<2) return;
  var total=0; for(var i=1;i<eMeasurePts.length;i++) total+=eDistFt(eMeasurePts[i-1],eMeasurePts[i]);
  eMeasureLines.push({line:eMeasureLine, labels:eMeasureLabels.slice(), markers:eMeasureMarkers.slice()});
  eMeasureLine=null; eMeasureLabels=[]; eMeasureMarkers=[]; eMeasurePts=[];
  document.getElementById('e-mstat').textContent='Measured '+Math.round(total)+' ft \u00b7 measure another, or switch tools.';
}
function eClearDrawing() {
  eClickPts=[]; eClickMarkers.forEach(function(m){ if(eLmap) eLmap.removeLayer(m); }); eClickMarkers=[];
  if(eClickLine){ eLmap.removeLayer(eClickLine); eClickLine=null; }
  if(eClickPoly){ eLmap.removeLayer(eClickPoly); eClickPoly=null; }
  eFacets.forEach(function(f){ if(eLmap&&f.poly) eLmap.removeLayer(f.poly); }); eFacets=[]; eFacetTotal=0;
  eMeasureLines.forEach(function(g){ if(g.line) eLmap.removeLayer(g.line); g.labels.forEach(function(l){ eLmap.removeLayer(l); }); g.markers.forEach(function(m){ eLmap.removeLayer(m); }); }); eMeasureLines=[];
  if(eMeasureLine){ eLmap.removeLayer(eMeasureLine); eMeasureLine=null; }
  eMeasureLabels.forEach(function(l){ eLmap.removeLayer(l); }); eMeasureLabels=[];
  eMeasureMarkers.forEach(function(m){ eLmap.removeLayer(m); }); eMeasureMarkers=[]; eMeasurePts=[];
  eS.sqft=0; eS.usedMap=false;
  document.getElementById('e-mresult').style.display='none';
  var card=document.getElementById('e-slopecard'); if(card) card.style.display='none';
  document.getElementById('e-mstat').textContent='Click each corner of a roof section to trace it (triangles OK). Double-click to finish each section.';
  if(eLmap) eSetDrawMode(true);
  eCheckBtn1();
}

/* SLIDER */
function eToggleManual() {
  eManualOpen=!eManualOpen;
  document.getElementById('e-sldwrap').style.display=eManualOpen?'block':'none';
  document.getElementById('e-manualbtn').textContent=eManualOpen?"Hide manual entry ↑":"Can't trace the roof? Enter size manually";
  if(eManualOpen&&!eS.usedMap) eHandleSlider(document.getElementById('e-sld').value);
}
function eHandleSlider(v) {
  document.getElementById('e-sldval').textContent=parseInt(v).toLocaleString();
  var pct=(v-400)/(8000-400)*100;
  document.getElementById('e-sld').style.background='linear-gradient(90deg,var(--a) '+pct+'%,var(--bs) '+pct+'%)';
  if(eManualOpen){ eS.sqft=parseInt(v); eS.usedMap=false; eCheckBtn1(); }
}
function eUpdateSlider(v){ document.getElementById('e-sld').value=v; eHandleSlider(v); }

/* MATERIALS */
var E_ICONS={'asphalt-3tab':'🏚','asphalt-arch':'🏠','asphalt-designer':'🏡','metal-ribbed':'⚡','metal-standing':'🔩','tile-concrete':'🧱','tile-clay':'🪴','flat-tpo':'⬜','flat-epdm':'⬛','flat-modbit':'🔲','wood-shake':'🪵','slate-synthetic':'💎','slate-natural':'🪨','shingles-solar':'☀️'};
function eBuildMats() {
  var l=document.getElementById('e-matlist'), html='';
  Object.keys(E_CONFIG.pricing).forEach(function(k){
    var v=E_CONFIG.pricing[k];
    html+='<div class="e-oi" onclick="ePick(this,\'material\',\''+k+'\')">'
      +'<div class="e-oi-em">'+(E_ICONS[k]||'🏠')+'</div>'
      +'<div class="e-oi-info"><div class="e-oi-lbl">'+v.label+'</div>'
      +'<div class="e-oi-desc">$'+v.low+'–$'+v.high+'/sq installed · '+v.note+'</div></div>'
      +'<div class="e-oi-radio">✓</div></div>';
  });
  l.innerHTML=html;
}

/* SELECTION HELPERS */
function ePick(el, key, val) {
  var list=el.closest('.e-olist');
  list.querySelectorAll('.e-oi').forEach(function(i){ i.classList.remove('sel'); });
  el.classList.add('sel'); eS[key]=val;
  var map2={material:'e-btn2',pitch:'e-btn3',stories:'e-btn4',project:'e-btn5'};
  if(map2[key]) document.getElementById(map2[key]).disabled=false;
}
function ePickQ(el, key, val) {
  el.closest('.e-olist').querySelectorAll('.e-oi').forEach(function(i){ i.classList.remove('sel'); });
  el.classList.add('sel'); eS[key]=val;
  var btnMap={urgency:'e-btn6',damages:'e-btn7',insurance:'e-btn8'};
  if(btnMap[key]) document.getElementById(btnMap[key]).disabled=false;
}
function eChkForm() {
  var ok=document.getElementById('e-fn').value.trim()&&document.getElementById('e-ln').value.trim()&&document.getElementById('e-ph').value.trim().length>=7&&document.getElementById('e-em').value.includes('@');
  document.getElementById('e-btn9').disabled=!ok;
}
function eCheckBtn1(){ document.getElementById('e-btn1').disabled=!(eS.addr&&eS.sqft>0); }

/* DOTS */
function eBuildAllDots() {
  for(var s=1;s<=E_TOTAL;s++){
    var el=document.getElementById('e-dots'+s); if(!el) continue;
    var html='';
    for(var i=1;i<=E_TOTAL;i++){ var cls=i<s?'done':i===s?'act':''; html+='<div class="e-sdot '+cls+'"></div>'; }
    el.innerHTML=html;
  }
}

/* NAVIGATION */
function eGo(n, back) {
  var oldEl=document.getElementById(eCur<=E_TOTAL?'e-sp'+eCur:'e-spR');
  oldEl.classList.remove('active','back');
  var nextEl=document.getElementById(n<=E_TOTAL?'e-sp'+n:'e-spR');
  nextEl.classList.add('active');
  if(back){ nextEl.classList.add('back'); setTimeout(function(){ nextEl.classList.remove('back'); },450); }
  eCur=n;
  var _dn=(n>3?n-1:n); var pct=Math.round((Math.min(_dn,10)/10)*100);
  document.getElementById('e-pfill').style.width=pct+'%';
  var names=['','Address','Material','Pitch','Stories','Project Type','Urgency','Damages','Insurance','Your Info','Calculating',''];
  document.getElementById('e-tstep').innerHTML=n<=E_TOTAL?'Step <b>'+_dn+'</b> of 10 — '+(names[n]||''):'<b>✓ Estimate Complete</b>';
  // Only scroll if the top of the estimator is above the viewport
  var embed=document.getElementById('est-embed-shell');
  if(embed){ var rect=embed.getBoundingClientRect(); if(rect.top<0) embed.scrollIntoView({behavior:'smooth',block:'start'}); }
  if(n===1){ var _z=document.getElementById('e-zippanel'),_a=document.getElementById('e-addrpanel'); if(_z)_z.style.display='none'; if(_a)_a.style.display='block'; document.getElementById('e-tstep').innerHTML='Step <b>1</b> of 10 \u2014 Address'; if(eLmap) setTimeout(function(){ eLmap.invalidateSize(); },150); }
}

/* SUBMIT + RESULT */
function eCalcPrice(){
  var p=E_CONFIG.pricing[eS.material]||E_CONFIG.pricing['asphalt-arch'];
  var pm=E_CONFIG.pitchMult[eS.pitch]||1.18, sm=E_CONFIG.storiesMult[eS.stories]||1.00;
  var prm=E_CONFIG.projectMult[eS.project]||1.00, rm=parseFloat(E_CONFIG.regionMult[eS.region]||1.00);
  var sq=Math.ceil(eS.sqft/100);
  var lowPerSq=Math.round(p.low*pm*sm*rm), highPerSq=Math.round(p.high*pm*sm*rm);
  var low=Math.round(sq*lowPerSq*prm/100)*100, high=Math.round(sq*highPerSq*prm/100)*100;
  return {low:low, high:high, mid:Math.round((low+high)/2)};
}
function eDoSubmit() {
  var _est = eCalcPrice();
  if(E_CONFIG.webhookUrl){ fetch(E_CONFIG.webhookUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({firstName:document.getElementById('e-fn').value,lastName:document.getElementById('e-ln').value,phone:document.getElementById('e-ph').value,email:document.getElementById('e-em').value,notes:document.getElementById('e-nt').value,address:eS.addr,sqft:eS.sqft,material:eS.material,pitch:eS.pitch,stories:eS.stories,project:eS.project,region:eS.region,estimateLow:_est.low,estimateHigh:_est.high,estimateValue:_est.mid,source:E_CONFIG.companyName+' Roof Estimator',timestamp:new Date().toISOString()})}).catch(function(){}); }
  eGo(10);
  var ids=['e-ld1','e-ld2','e-ld3','e-ld4','e-ld5'], li=0;
  function eNextStep(){ if(li>=ids.length){ setTimeout(eShowResult,500); return; } document.getElementById(ids[li]).classList.remove('act'); document.getElementById(ids[li]).classList.add('done'); li++; if(li<ids.length) document.getElementById(ids[li]).classList.add('act'); setTimeout(eNextStep,680); }
  setTimeout(eNextStep,680);
}
function eShowResult() {
  var p=E_CONFIG.pricing[eS.material]||E_CONFIG.pricing['asphalt-arch'];
  var pm=E_CONFIG.pitchMult[eS.pitch]||1.18, sm=E_CONFIG.storiesMult[eS.stories]||1.00;
  var prm=E_CONFIG.projectMult[eS.project]||1.00, rm=parseFloat(E_CONFIG.regionMult[eS.region]||1.00);
  var sq=Math.ceil(eS.sqft/100);
  var lowPerSq=Math.round(p.low*pm*sm*rm), highPerSq=Math.round(p.high*pm*sm*rm);
  var low=Math.round(sq*lowPerSq*prm/100)*100, high=Math.round(sq*highPerSq*prm/100)*100;
  document.getElementById('e-rrange').innerHTML='$'+low.toLocaleString()+' — <em>$'+high.toLocaleString()+'</em>';
  document.getElementById('e-rnote').textContent=eS.sqft.toLocaleString()+' sq ft · '+p.label+' · '+eS.pitch+' pitch · '+eS.stories+' story · '+(eS.project||'').replace('-',' ')+' · '+eS.regionLabel+(eS.usedMap?' · Measured via satellite':' · Manual estimate');
  document.getElementById('e-rv1').textContent=eS.sqft.toLocaleString()+' sq ft';
  document.getElementById('e-rv2').textContent=sq+' squares';
  document.getElementById('e-rv3').textContent=p.label;
  document.getElementById('e-rv4').textContent=eS.pitch.charAt(0).toUpperCase()+eS.pitch.slice(1).replace('-',' ');
  document.getElementById('e-rv5').textContent=eS.regionLabel||'National Average';
  document.getElementById('e-rv6').textContent='$'+lowPerSq+'–$'+highPerSq+'/sq';
  document.getElementById('e-sp10').classList.remove('active');
  document.getElementById('e-spR').classList.add('active');
  document.getElementById('e-pfill').style.width='100%';
  document.getElementById('e-tstep').innerHTML='<b>✓ Estimate Complete</b>';
  var embed=document.getElementById('est-embed-shell');
  if(embed){ var rect=embed.getBoundingClientRect(); if(rect.top<0) embed.scrollIntoView({behavior:'smooth',block:'start'}); }
}

/* RESTART */
function eRestart() {
  eS={addr:'',sqft:0,usedMap:false,lat:0,lon:0,material:'',pitch:'',stories:'',project:'',region:'national',regionLabel:'National Average',urgency:'',damages:'',insurance:''};
  document.getElementById('e-addrIn').value='';
  document.getElementById('e-mapwrap').style.display='none';
  document.getElementById('e-mresult').style.display='none';
  document.getElementById('e-sldwrap').style.display='none';
  eManualOpen=false;
  document.getElementById('e-manualbtn').textContent="Can't trace the roof? Enter size manually";
  eClearDrawing();
  document.querySelectorAll('#est-embed .e-oi').forEach(function(i){ i.classList.remove('sel'); });
  document.querySelectorAll('#est-embed .e-rb').forEach(function(b){ b.classList.remove('on'); });
  for(var i=1;i<=9;i++){ var b=document.getElementById('e-btn'+i); if(b) b.disabled=true; }
  ['e-fn','e-ln','e-ph','e-em','e-nt'].forEach(function(id){ document.getElementById(id).value=''; });
  var ldIds=['e-ld1','e-ld2','e-ld3','e-ld4','e-ld5'];
  ldIds.forEach(function(id,idx){ var el=document.getElementById(id); el.classList.remove('done','act'); if(idx===0) el.classList.add('act'); });
  document.getElementById('e-spR').classList.remove('active');
  eCur=1; eGo(1);
  document.getElementById('e-pfill').style.width='9%';
  document.getElementById('e-tstep').innerHTML='Step <b>1</b> of 10 — Address';
}

document.getElementById('e-cco').textContent = E_CONFIG.companyName;
document.getElementById('e-rctabtn').textContent = E_CONFIG.ctaText;
document.getElementById('e-rctabtn').onclick = function() { window.open(E_CONFIG.ctaUrl,'_blank'); };
eBuildMats();
eBuildAllDots();
eUpdateSlider(1800);
document.addEventListener('click', function(e) {
  if (!e.target.closest('.e-asearch')) {
    var s = document.getElementById('e-suggestions');
    if (s) s.classList.remove('open');
  }
});
