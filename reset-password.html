<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuilderPro OS — Set New Password</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080e1f;--panel:#0c1428;--panel2:#0e1830;--line:rgba(80,140,255,.18);
  --blue:#0070ff;--blue2:#3d7fff;--txt:rgba(255,255,255,.85);--mut:rgba(255,255,255,.5);--red:#ff5a5a;--green:#00d478;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(900px 500px at 50% -10%,rgba(0,112,255,.14),transparent);}
.wrap{width:100%;max-width:400px;}
.brand{display:flex;align-items:center;justify-content:center;gap:.6rem;margin-bottom:1.6rem;}
.brand .mk{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--blue2));display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:800;font-size:22px;color:#fff;}
.brand .nm{font-family:'Barlow Condensed';font-weight:700;font-size:1.5rem;color:#fff;}
.brand .nm span{color:var(--blue2);}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:2rem 1.8rem;box-shadow:0 24px 60px rgba(0,0,0,.4);}
h1{font-family:'Barlow Condensed';font-weight:700;font-size:1.5rem;color:#fff;margin-bottom:.3rem;}
.sub{font-size:.9rem;color:var(--mut);margin-bottom:1.3rem;}
label{display:block;font-size:.8rem;font-weight:600;margin:.9rem 0 .4rem;}
input{width:100%;padding:.75rem .9rem;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:#fff;font-size:.95rem;font-family:inherit;outline:none;}
input:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(61,127,255,.16);}
.btn{width:100%;margin-top:1.3rem;padding:.8rem;background:var(--blue);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:.98rem;cursor:pointer;font-family:'Barlow';}
.btn:hover{background:var(--blue2);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.msg{margin-top:1rem;padding:.7rem .9rem;border-radius:9px;font-size:.85rem;display:none;}
.msg.err{background:rgba(255,90,90,.12);border:1px solid rgba(255,90,90,.3);color:var(--red);display:block;}
.msg.ok{background:rgba(0,212,120,.12);border:1px solid rgba(0,212,120,.3);color:var(--green);display:block;}
a.link{color:var(--blue2);font-size:.85rem;display:block;text-align:center;margin-top:1.2rem;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="mk">B</span><span class="nm">BuilderPro<span>OS</span></span></div>
  <div class="card">
    <h1>Set a new password</h1>
    <div class="sub" id="sub">Enter a new password for your account.</div>
    <div id="form">
      <label for="pw">New password</label>
      <input type="password" id="pw" placeholder="At least 6 characters" autocomplete="new-password">
      <label for="pw2">Confirm password</label>
      <input type="password" id="pw2" placeholder="Re-enter password" autocomplete="new-password">
      <button class="btn" id="btn" onclick="doReset()">Update Password</button>
    </div>
    <div class="msg" id="msg"></div>
    <a class="link" href="login.html">← Back to sign in</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="bp-config.js"></script>
<script>
function showMsg(t,x){ var el=document.getElementById('msg'); el.className='msg '+t; el.textContent=x; }

// When arriving from the reset email, Supabase establishes a recovery session automatically.
var hasRecovery=false;
bpClient.auth.onAuthStateChange(function(event, session){
  if(event==='PASSWORD_RECOVERY' || session){ hasRecovery=true; }
});
(async function(){
  try{ var { data } = await bpClient.auth.getSession(); if(data.session) hasRecovery=true; }catch(e){}
  if(!hasRecovery){
    setTimeout(async function(){
      var { data } = await bpClient.auth.getSession();
      if(!data.session){ document.getElementById('sub').textContent='This reset link is invalid or expired. Request a new one from the sign-in page.'; }
    }, 1200);
  }
})();

async function doReset(){
  var pw=document.getElementById('pw').value, pw2=document.getElementById('pw2').value;
  var btn=document.getElementById('btn');
  if(pw.length<6){ showMsg('err','Password must be at least 6 characters.'); return; }
  if(pw!==pw2){ showMsg('err','Passwords do not match.'); return; }
  btn.disabled=true; btn.textContent='Updating…';
  try{
    var { error } = await bpClient.auth.updateUser({ password: pw });
    if(error) throw error;
    showMsg('ok','Password updated. Redirecting you to sign in…');
    document.getElementById('form').style.display='none';
    setTimeout(function(){ bpClient.auth.signOut(); window.location.href='login.html'; }, 1800);
  }catch(e){
    showMsg('err', e.message || 'Could not update password. The link may have expired.');
    btn.disabled=false; btn.textContent='Update Password';
  }
}
</script>
</body>
</html>
