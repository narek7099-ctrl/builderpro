<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuilderPro OS — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080e1f;--panel:#0c1428;--panel2:#0e1830;--line:rgba(80,140,255,.16);
  --blue:#0070ff;--blue2:#3d7fff;--txt:rgba(255,255,255,.85);--mut:rgba(255,255,255,.5);--green:#00d478;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
#gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;color:var(--mut);}
.app{display:flex;min-height:100vh;}
/* sidebar */
.side{width:230px;background:var(--panel);border-right:1px solid var(--line);padding:1.3rem 0;display:flex;flex-direction:column;flex-shrink:0;}
.side .brand{display:flex;align-items:center;gap:.55rem;padding:0 1.3rem 1.4rem;}
.side .mk{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--blue2));display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';font-weight:800;font-size:18px;color:#fff;}
.side .nm{font-family:'Barlow Condensed';font-weight:700;font-size:1.2rem;color:#fff;}
.side .nm span{color:var(--blue2);}
.nav{display:flex;flex-direction:column;gap:.2rem;padding:0 .7rem;flex:1;}
.nav a{display:flex;align-items:center;gap:.7rem;padding:.7rem .8rem;border-radius:9px;color:var(--mut);font-size:.92rem;font-weight:600;cursor:pointer;text-decoration:none;transition:.15s;}
.nav a:hover{background:var(--panel2);color:var(--txt);}
.nav a.on{background:rgba(0,112,255,.14);color:#fff;border:1px solid rgba(0,112,255,.3);}
.nav a svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;}
.side .user{padding:1rem 1.3rem 0;border-top:1px solid var(--line);margin-top:1rem;}
.side .uemail{font-size:.8rem;color:var(--mut);margin-bottom:.6rem;word-break:break-all;}
.logout{width:100%;padding:.6rem;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--txt);font-family:inherit;font-weight:600;font-size:.86rem;cursor:pointer;}
.logout:hover{border-color:var(--blue2);color:#fff;}
/* main */
.main{flex:1;padding:2rem 2.4rem;overflow-y:auto;}
.hdr{margin-bottom:1.6rem;}
.hdr h1{font-family:'Barlow Condensed';font-weight:700;font-size:1.9rem;color:#fff;}
.hdr p{color:var(--mut);font-size:.95rem;margin-top:.2rem;}
.ph{background:var(--panel);border:1px dashed var(--line);border-radius:14px;padding:3rem 2rem;text-align:center;color:var(--mut);}
.ph .ico{width:48px;height:48px;margin:0 auto 1rem;border-radius:12px;background:rgba(0,112,255,.12);display:flex;align-items:center;justify-content:center;}
.ph .ico svg{width:24px;height:24px;stroke:var(--blue2);fill:none;stroke-width:2;}
.ph b{color:var(--txt);display:block;font-size:1.05rem;margin-bottom:.4rem;}
.badge{display:inline-block;margin-top:1rem;font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--blue2);background:rgba(0,112,255,.12);border:1px solid rgba(0,112,255,.25);border-radius:50px;padding:.25rem .8rem;}
@media(max-width:760px){.side{width:64px;}.side .nm,.side .uemail,.nav a span{display:none;}.side .brand{justify-content:center;padding:0 0 1.4rem;}.nav a{justify-content:center;}.main{padding:1.4rem;}}
</style>
</head>
<body>
<div id="gate">Loading…</div>
<div class="app" id="app" style="display:none">
  <aside class="side">
    <div class="brand"><span class="mk">B</span><span class="nm">BuilderPro<span>OS</span></span></div>
    <nav class="nav" id="nav">
      <a class="on" data-view="dashboard" onclick="nav('dashboard')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg><span>Dashboard</span></a>
      <a data-view="messaging" onclick="nav('messaging')"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Messaging</span></a>
      <a data-view="contacts" onclick="nav('contacts')"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg><span>Contacts</span></a>
      <a data-view="automations" onclick="nav('automations')"><svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/></svg><span>Automations</span></a>
    </nav>
    <div class="user">
      <div class="uemail" id="uemail">—</div>
      <button class="logout" onclick="logout()">Sign out</button>
    </div>
  </aside>
  <main class="main">
    <div class="hdr"><h1 id="vtitle">Dashboard</h1><p id="vsub">Your BuilderPro overview.</p></div>
    <div id="viewArea"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="bp-config.js"></script>
<script>
var VIEWS={
  dashboard:{t:'Dashboard',s:'Your leads, bookings, and pipeline at a glance.',b:'Live stats coming in Phase 2',
    ico:'<rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/>',
    body:'Your dashboard will show new leads, appointments booked, missed calls recovered, and pipeline value — pulled live from your BuilderPro system.'},
  messaging:{t:'Messaging',s:'Your texts and emails with leads, in one place.',b:'Coming soon',
    ico:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
    body:'View and reply to your SMS and email conversations with leads — all synced with your BuilderPro system.'},
  contacts:{t:'Contacts',s:'Every lead and customer BuilderPro captures for you.',b:'Coming in Phase 2',
    ico:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>',
    body:'Your full contact list — names, phone numbers, and where each lead is in your pipeline.'},
  automations:{t:'Automations',s:'The systems working for you 24/7.',b:'Coming soon',
    ico:'<path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4"/>',
    body:'See every automation BuilderPro runs for you — missed-call text-back, Atlas AI receptionist, review requests, and more.'}
};
function nav(v){
  document.querySelectorAll('#nav a').forEach(function(a){ a.classList.toggle('on', a.getAttribute('data-view')===v); });
  var d=VIEWS[v];
  document.getElementById('vtitle').textContent=d.t;
  document.getElementById('vsub').textContent=d.s;
  document.getElementById('viewArea').innerHTML=
    '<div class="ph"><div class="ico"><svg viewBox="0 0 24 24">'+d.ico+'</svg></div>'
    +'<b>'+d.t+'</b>'+d.body+'<div class="badge">'+d.b+'</div></div>';
}
async function logout(){ await bpClient.auth.signOut(); window.location.href='login.html'; }

// Gate: require a logged-in session, else bounce to login
(async function(){
  try{
    var { data } = await bpClient.auth.getSession();
    if(!data.session){ window.location.href='login.html'; return; }
    document.getElementById('uemail').textContent = data.session.user.email;
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='flex';
    nav('dashboard');
  }catch(e){ window.location.href='login.html'; }
})();
</script>
</body>
</html>
